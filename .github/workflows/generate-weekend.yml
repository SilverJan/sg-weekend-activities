name: Generate Weekend Activities

on:
  schedule:
    # Friday 1:00 PM UTC = Friday 9:00 PM SGT
    - cron: '0 13 * * 5'
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute weekend dates and resolve prompt
        id: prompt
        run: |
          WEEKEND_SAT=$(date -u -d "next Saturday" '+%A, %d %B %Y')
          WEEKEND_SUN=$(date -u -d "next Sunday" '+%A, %d %B %Y')
          PROMPT=$(cat prompt.md)
          PROMPT="${PROMPT//\{\{SATURDAY_DATE\}\}/$WEEKEND_SAT}"
          PROMPT="${PROMPT//\{\{SUNDAY_DATE\}\}/$WEEKEND_SUN}"
          echo "$PROMPT" > /tmp/resolved-prompt.md

      - name: Generate weekend activities page with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          prompt_file: /tmp/resolved-prompt.md
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash,Read,Write,Edit,WebSearch,WebFetch,Glob,Grep"
          max_turns: "30"

      - name: Verify output was generated
        run: |
          if [ ! -f public/index.html ]; then
            echo "::error::public/index.html was not generated by Claude Code"
            exit 1
          fi
          SIZE=$(wc -c < public/index.html)
          echo "Generated public/index.html ($SIZE bytes)"
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::Generated file seems too small ($SIZE bytes)"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: generate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
