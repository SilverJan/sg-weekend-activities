name: Generate Weekend Activities

on:
  schedule:
    # Friday 1:00 PM UTC = Friday 9:00 PM SGT
    - cron: '0 13 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    # Isolated: runs Claude once. If later jobs fail, "Re-run failed jobs"
    # on GitHub picks up from the uploaded artifact without re-invoking Claude.
    runs-on: ubuntu-latest
    outputs:
      current_sat_iso: ${{ steps.prompt.outputs.current_sat_iso }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute weekend dates (SGT) and resolve prompt
        id: prompt
        run: |
          export TZ=Asia/Singapore
          TODAY_ISO=$(date +%Y-%m-%d)
          TODAY_DATE=$(date '+%A, %d %B %Y')
          DOW=$(date +%u) # 1=Mon..7=Sun

          if [ "$DOW" -le 5 ]; then
            DAYS_UNTIL_SAT=$((6 - DOW))
            CURRENT_SAT_ISO=$(date -d "+${DAYS_UNTIL_SAT} days" +%Y-%m-%d)
          elif [ "$DOW" -eq 6 ]; then
            CURRENT_SAT_ISO=$(date +%Y-%m-%d)
          else
            CURRENT_SAT_ISO=$(date -d "yesterday" +%Y-%m-%d)
          fi

          CURRENT_SUN_ISO=$(date -d "$CURRENT_SAT_ISO +1 day" +%Y-%m-%d)
          UPCOMING_SAT_ISO=$(date -d "$CURRENT_SAT_ISO +7 days" +%Y-%m-%d)
          UPCOMING_SUN_ISO=$(date -d "$CURRENT_SAT_ISO +8 days" +%Y-%m-%d)

          CURRENT_SAT_DATE=$(date -d "$CURRENT_SAT_ISO" '+%A, %d %B %Y')
          CURRENT_SUN_DATE=$(date -d "$CURRENT_SUN_ISO" '+%A, %d %B %Y')
          UPCOMING_SAT_DATE=$(date -d "$UPCOMING_SAT_ISO" '+%A, %d %B %Y')
          UPCOMING_SUN_DATE=$(date -d "$UPCOMING_SUN_ISO" '+%A, %d %B %Y')

          echo "Dates computed (SGT):"
          echo "  TODAY            = $TODAY_DATE ($TODAY_ISO)"
          echo "  This weekend     = $CURRENT_SAT_DATE .. $CURRENT_SUN_DATE"
          echo "  Upcoming weekend = $UPCOMING_SAT_DATE .. $UPCOMING_SUN_DATE"

          echo "current_sat_iso=$CURRENT_SAT_ISO" >> "$GITHUB_OUTPUT"

          PROMPT=$(cat prompt.md)
          PROMPT="${PROMPT//\{\{TODAY_DATE\}\}/$TODAY_DATE}"
          PROMPT="${PROMPT//\{\{CURRENT_SAT_DATE\}\}/$CURRENT_SAT_DATE}"
          PROMPT="${PROMPT//\{\{CURRENT_SUN_DATE\}\}/$CURRENT_SUN_DATE}"
          PROMPT="${PROMPT//\{\{UPCOMING_SAT_DATE\}\}/$UPCOMING_SAT_DATE}"
          PROMPT="${PROMPT//\{\{UPCOMING_SUN_DATE\}\}/$UPCOMING_SUN_DATE}"
          PROMPT="${PROMPT//\{\{CURRENT_SAT_ISO\}\}/$CURRENT_SAT_ISO}"

          {
            echo 'content<<PROMPT_EOF'
            echo "$PROMPT"
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Generate weekend activities pages with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.prompt.outputs.content }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--max-turns 45 --allowed-tools "Bash,Read,Write,Edit,WebSearch,WebFetch,Glob,Grep"'

      - name: Verify outputs were generated
        run: |
          if [ ! -f public/index.html ]; then
            echo "::error::public/index.html was not generated"
            exit 1
          fi
          ARCHIVE_FILE="public/archive/${{ steps.prompt.outputs.current_sat_iso }}.html"
          if [ ! -f "$ARCHIVE_FILE" ]; then
            echo "::error::$ARCHIVE_FILE was not generated"
            exit 1
          fi
          echo "index.html    = $(wc -c < public/index.html) bytes"
          echo "archive file  = $(wc -c < "$ARCHIVE_FILE") bytes"

      - name: Upload generated site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-content
          path: public
          retention-days: 7

  archive-commit:
    # Commits the new archive HTML snapshot back to main so it persists
    # across runs for the "Past weekends" section.
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download generated site
        uses: actions/download-artifact@v4
        with:
          name: site-content
          path: public

      - name: Commit new archive snapshot (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/archive/
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
            exit 0
          fi
          git commit -m "Archive weekend snapshot for ${{ needs.generate.outputs.current_sat_iso }}"
          git push

  deploy:
    # Independent of archive-commit — site still deploys even if the commit
    # step fails. Re-runnable on its own without re-invoking Claude.
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download generated site
        uses: actions/download-artifact@v4
        with:
          name: site-content
          path: public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
